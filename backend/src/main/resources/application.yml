spring:
  config:
    import:
      - optional:file:.env[.properties]
  application:
    name: ${SPRING_APPLICATION_NAME:backend}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/${MYSQL_DATABASE:app}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, email, profile
          naver:
            client-id: ${NAVER_CLIENT_ID:REPLACE_ME}
            client-secret: ${NAVER_CLIENT_SECRET:REPLACE_ME}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email
            client-name: Naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID:REPLACE_ME}
            client-secret: ${KAKAO_CLIENT_SECRET:REPLACE_ME}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800
  refresh-token-expiry: 604800

cookie:
  secure: ${COOKIE_SECURE:false}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  default-locale: ${APP_DEFAULT_LOCALE:ko}
  http:
    client-ip:
      trust-forwarded-headers: false
      trusted-proxies: []
  mail:
    from: ${MAIL_FROM:noreply@example.com}
  member:
    cleanup:
      unverified:
        enabled: ${UNVERIFIED_MEMBER_CLEANUP_ENABLED:true}
        age-days: ${UNVERIFIED_MEMBER_CLEANUP_AGE_DAYS:7}
        cron: ${UNVERIFIED_MEMBER_CLEANUP_CRON:0 0 3 * * *}
  order:
    timeout:
      enabled: ${ORDER_TIMEOUT_ENABLED:true}
      cron: ${ORDER_TIMEOUT_CRON:0 * * * * *}
  inventory:
    mode: ${APP_INVENTORY_MODE:db-lock}
    redis:
      sync-delay-ms: ${APP_INVENTORY_REDIS_SYNC_DELAY_MS:1000}
  payment:
    kafka:
      enabled: ${APP_PAYMENT_KAFKA_ENABLED:true}
      topic: ${APP_PAYMENT_KAFKA_TOPIC:payment-result.v1}
      consumer-group: ${APP_PAYMENT_KAFKA_CONSUMER_GROUP:order-payment-result}
      publisher-delay-ms: ${APP_PAYMENT_KAFKA_PUBLISHER_DELAY_MS:500}
      publisher-batch-size: ${APP_PAYMENT_KAFKA_PUBLISHER_BATCH_SIZE:100}
      max-attempts: ${APP_PAYMENT_KAFKA_MAX_ATTEMPTS:20}
  name: ${APP_NAME:application}

payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
    client-key: ${TOSS_CLIENT_KEY:}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      public:
        info: false
        prometheus: false
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      show-components: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,3s
  prometheus:
    metrics:
      export:
        descriptions: true

info:
  application:
    name: ${spring.application.name}
    stack: actuator,micrometer,prometheus,grafana

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}

server:
  port: 8080
